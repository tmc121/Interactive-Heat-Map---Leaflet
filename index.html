<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>T-Virus Heat Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #08111d;
      font-family: "Nimbus Sans", Arial, Helvetica, sans-serif;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #map {
      width: 100%;
      height: 100%;
      background: #08111d;
    }

    #searchBar {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 1000;
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    #locationInput,
    #searchBtn {
      height: 32px;
      border: 1px solid #CC0000;
      border-radius: 2px;
      background: #700000;
      color: #F0F0F0;
      font-family: "Nimbus Sans", Arial, Helvetica, sans-serif;
      font-weight: 700;
      font-size: 13px;
      line-height: 1;
    }

    #locationInput {
      flex: 1;
      padding: 0 12px;
      outline: none;
    }

    #locationInput::placeholder {
      color: #F0F0F0;
      opacity: 0.75;
    }

    #searchBtn {
      padding: 0 14px;
      cursor: pointer;
    }

    .leaflet-container {
      background: #08111d;
      font-family: "Nimbus Sans", Arial, Helvetica, sans-serif;
    }

    .leaflet-control-container,
    .leaflet-control-attribution {
      display: none;
    }

    .leaflet-popup-content-wrapper,
    .leaflet-popup-tip {
      background: rgba(112, 0, 0, 0.96);
      color: #F0F0F0;
      border: 1px solid #CC0000;
      border-radius: 2px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.35);
    }

    .leaflet-popup-content {
      margin: 8px 10px;
      font-family: "Nimbus Sans", Arial, Helvetica, sans-serif;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
    }

    @media (max-width: 640px) {
      #searchBar {
        top: 10px;
        left: 10px;
        right: 10px;
      }

      #locationInput,
      #searchBtn {
        height: 32px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="searchBar">
      <input
        id="locationInput"
        type="text"
        placeholder="Search address, city, state, country, or continent"
        autocomplete="off"
      />
      <button id="searchBtn" type="button">Go</button>
    </div>
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>

  </script>

  <script>
    const initialData = {
      "North America": { population: 604000000, infected: 8200000, center: [54, -105], bounds: [[15, -170], [83, -50]], country: "Multiple" },
      "South America": { population: 439000000, infected: 5100000, center: [-15, -60], bounds: [[-58, -92], [15, -30]], country: "Multiple" },
      "Africa": { population: 1460000000, infected: 9100000, center: [3, 21], bounds: [[-35, -20], [38, 52]], country: "Multiple" },
      "Asia": { population: 4780000000, infected: 28600000, center: [34, 96], bounds: [[5, 25], [78, 180]], country: "Multiple" },
      "Europe": { population: 748000000, infected: 6400000, center: [54, 15], bounds: [[35, -12], [72, 40]], country: "Multiple" },
      "Australia": { population: 46000000, infected: 240000, center: [-25, 134], bounds: [[-47, 110], [-9, 179]], country: "Australia" },
      "Antarctica": { population: 4500, infected: 120, center: [-82, 20], bounds: [[-89, -180], [-60, 180]], country: "Antarctica" }
    };

    const continentShapes = {
      "North America": [[72,-150],[65,-130],[58,-120],[50,-110],[40,-100],[28,-97],[20,-105],[18,-120],[28,-135],[45,-150]],
      "South America": [[12,-78],[5,-72],[-8,-68],[-20,-62],[-35,-60],[-50,-68],[-55,-74],[-35,-78],[-12,-80]],
      "Africa": [[34,-10],[30,10],[22,25],[10,35],[-8,40],[-22,32],[-34,18],[-30,5],[-5,-10],[20,-15]],
      "Europe": [[70,-10],[65,10],[60,25],[52,35],[44,28],[38,15],[42,0],[50,-8]],
      "Asia": [[70,35],[65,70],[58,100],[50,125],[40,145],[25,150],[10,120],[8,90],[15,60],[30,40],[45,35]],
      "Australia": [[-12,113],[-18,128],[-22,140],[-30,151],[-39,146],[-42,130],[-30,116]],
      "Antarctica": [[-62,-180],[-68,-120],[-72,-60],[-74,0],[-72,60],[-68,120],[-62,180]]
    };

    const continentBounds = {
      "North America": [[15, -170], [83, -50]],
      "South America": [[-58, -92], [15, -30]],
      "Africa": [[-35, -20], [38, 52]],
      "Asia": [[5, 25], [78, 180]],
      "Europe": [[35, -12], [72, 40]],
      "Australia": [[-47, 110], [-9, 179]],
      "Antarctica": [[-89, -180], [-60, 180]]
    };

    const continentGeoJson = {
      type: "FeatureCollection",
      features: Object.entries(continentShapes).map(([name, coords]) => {
        const ring = coords.map(([lat, lng]) => [lng, lat]);

        return {
          type: "Feature",
          properties: { name },
          geometry: {
            type: "Polygon",
            coordinates: [[...ring, ring[0]]]
          }
        };
      })
    };

    let state = JSON.parse(JSON.stringify(initialData));
    let heatLayer;
    let lastSearchCountry = "";
    const tooltipMarkers = [];
    let continentGeoJsonLayer;

    const map = L.map("map", {
      zoomControl: false,
      scrollWheelZoom: true,
      attributionControl: false
    }).setView([18, 10], 2);

    const labelsPane = map.getPane("labels") || map.createPane("labels");
    labelsPane.style.zIndex = "650";
    labelsPane.style.pointerEvents = "none";

    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}.png", {
      subdomains: "abcd",
      maxZoom: 6,
      minZoom: 2
    }).addTo(map);

    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}.png", {
      subdomains: "abcd",
      pane: "labels",
      maxZoom: 6,
      minZoom: 2
    }).addTo(map);

    function numberFmt(value) {
      return new Intl.NumberFormat().format(Math.round(value));
    }

    function infectedRate(population, infected) {
      if (!population || population <= 0) return 0;
      return infected / population;
    }

    function uninfected(population, infected) {
      return Math.max(0, population - infected);
    }

    function popupHtml(name, values) {
      const ratePct = infectedRate(values.population, values.infected) * 100;
      const countryLabel = values.country || lastSearchCountry || "Unknown";
      return `
        <strong>${name}</strong><br>
        Continent: ${name}<br>
        Country: ${countryLabel}<br>
        Population: ${numberFmt(values.population)}<br>
        Infected: ${numberFmt(values.infected)}<br>
        Uninfected: ${numberFmt(uninfected(values.population, values.infected))}<br>
        Infection Rate: ${ratePct.toFixed(2)}%
      `;
    }

    function buildHeatPoints() {
      const points = [];

      Object.entries(state).forEach(([name, values]) => {
        const coords = continentShapes[name];
        if (!coords) return;

        const intensity = infectedRate(values.population, values.infected);
        const normalized = Math.max(0.15, Math.min(intensity / 0.08, 1));

        coords.forEach(([lat, lng]) => {
          points.push([lat, lng, normalized * 0.75]);
        });

        points.push([values.center[0], values.center[1], Math.max(0.25, normalized)]);
      });

      return points;
    }

    function renderGeographyLayer() {
      if (continentGeoJsonLayer) {
        map.removeLayer(continentGeoJsonLayer);
      }

      continentGeoJsonLayer = L.geoJSON(continentGeoJson, {
        style(feature) {
          const values = state[feature.properties.name];
          const intensity = infectedRate(values.population, values.infected);

          return {
            color: "#CC0000",
            weight: 1.5,
            opacity: 0.9,
            fillColor: "#700000",
            fillOpacity: Math.max(0.1, Math.min(0.38, intensity * 2.5))
          };
        },
        onEachFeature(feature, layer) {
          const continentName = feature.properties.name;
          const values = state[continentName];

          layer.bindPopup(popupHtml(continentName, values), {
            closeButton: false,
            autoPan: false
          });

          layer.on("mouseover", function () {
            this.openPopup();
          });

          layer.on("click", function () {
            this.openPopup();
          });
        }
      }).addTo(map);
    }

    function clearTooltipMarkers() {
      tooltipMarkers.forEach(marker => map.removeLayer(marker));
      tooltipMarkers.length = 0;
    }

    function renderTooltips() {
      clearTooltipMarkers();

      Object.entries(state).forEach(([name, values]) => {
        const marker = L.circleMarker(values.center, {
          radius: 18,
          stroke: false,
          fillOpacity: 0
        }).addTo(map);

        marker.bindPopup(popupHtml(name, values), {
          closeButton: false,
          autoPan: false
        });

        marker.on("mouseover", function () {
          this.openPopup();
        });

        marker.on("click", function () {
          this.openPopup();
        });

        tooltipMarkers.push(marker);
      });
    }

    function renderHeat() {
      const heatPoints = buildHeatPoints();

      if (heatLayer) {
        heatLayer.setLatLngs(heatPoints);
      } else {
        heatLayer = L.heatLayer(heatPoints, {
          radius: 42,
          blur: 32,
          maxZoom: 5,
          minOpacity: 0.28,
          max: 1,
          gradient: {
            0.15: "#1b263b",
            0.3: "#415a77",
            0.45: "#778da9",
            0.6: "#ffba08",
            0.78: "#f48c06",
            1.0: "#d00000"
          }
        }).addTo(map);
      }

      renderGeographyLayer();
      renderTooltips();
    }

    async function searchLocation(query) {
      const normalized = query.trim();
      if (!normalized) return;

      const continentMatch = Object.keys(continentBounds).find(
        (name) => name.toLowerCase() === normalized.toLowerCase()
      );

      if (continentMatch) {
        map.fitBounds(continentBounds[continentMatch], { padding: [20, 20] });
        lastSearchCountry = "";
        return;
      }

      try {
        const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&addressdetails=1&q=${encodeURIComponent(normalized)}`;
        const response = await fetch(url, {
          headers: { "Accept": "application/json" }
        });

        const results = await response.json();
        if (!Array.isArray(results) || !results.length) return;

        const place = results[0];
        const lat = Number(place.lat);
        const lon = Number(place.lon);

        if (!Number.isFinite(lat) || !Number.isFinite(lon)) return;

        lastSearchCountry = place.address?.country || "";

        map.flyTo([lat, lon], 5, { duration: 1.5 });

        L.popup({
          closeButton: false,
          autoClose: true,
          closeOnClick: true
        })
          .setLatLng([lat, lon])
          .setContent(`
            <strong>${normalized}</strong><br>
            ${place.address?.country || ""}
          `)
          .openOn(map);

      } catch (error) {
        console.error("Location search failed:", error);
      }
    }

    function applyWixCollectionData(rows) {
      if (!Array.isArray(rows)) return;

      state = JSON.parse(JSON.stringify(initialData));

      rows.forEach((row) => {
        const continentName = row.nameOfArea;
        if (!state[continentName]) return;

        state[continentName].population = Number(row.population || 0);
        state[continentName].infected = Number(row.infected || 0);
      });

      renderHeat();
    }

    document.getElementById("searchBtn").addEventListener("click", () => {
      searchLocation(document.getElementById("locationInput").value);
    });

    document.getElementById("locationInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        searchLocation(event.target.value);
      }
    });

    window.addEventListener("message", (event) => {
      const message = event.data;
      if (!message || typeof message !== "object") return;

      if (message.type === "OUTBREAK_DATA") {
        applyWixCollectionData(message.payload);
      }

      if (message.type === "SET_LOCATION" && typeof message.payload === "string") {
        const input = document.getElementById("locationInput");
        input.value = message.payload;
        searchLocation(message.payload);
      }
    });

    renderHeat();
  </script>
</body>
</html>
