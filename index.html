<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>T-Virus Heat Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #08111d;
      font-family: "Nimbus Sans", Arial, Helvetica, sans-serif;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #map {
      width: 100%;
      height: 100%;
      background: #08111d;
    }

    #searchBar {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 1000;
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    #locationInput,
    #searchBtn {
      height: 32px;
      border: 1px solid #CC0000;
      border-radius: 2px;
      background: #700000;
      color: #F0F0F0;
      font-family: "Nimbus Sans", Arial, Helvetica, sans-serif;
      font-weight: 700;
      font-size: 13px;
      line-height: 1;
    }

    #locationInput {
      flex: 1;
      padding: 0 12px;
      outline: none;
    }

    #locationInput::placeholder {
      color: #F0F0F0;
      opacity: 0.75;
    }

    #searchBtn {
      padding: 0 14px;
      cursor: pointer;
    }

    .leaflet-container {
      background: #08111d;
      font-family: "Nimbus Sans", Arial, Helvetica, sans-serif;
    }

    .leaflet-control-container,
    .leaflet-control-attribution {
      display: none;
    }

    .leaflet-popup-content-wrapper,
    .leaflet-popup-tip {
      background: rgba(112, 0, 0, 0.96);
      color: #F0F0F0;
      border: 1px solid #CC0000;
      border-radius: 2px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.35);
    }

    .leaflet-popup-content {
      margin: 8px 10px;
      font-family: "Nimbus Sans", Arial, Helvetica, sans-serif;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
    }

    @media (max-width: 640px) {
      #searchBar {
        top: 10px;
        left: 10px;
        right: 10px;
      }

      #locationInput,
      #searchBtn {
        height: 32px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="searchBar">
      <input
        id="locationInput"
        type="text"
        placeholder="Search address, city, state, country, or continent"
        autocomplete="off"
      />
      <button id="searchBtn" type="button">Go</button>
    </div>
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    !function(){"use strict";function t(i){return this instanceof t?(this._canvas=i="string"==typeof i?document.getElementById(i):i,this._ctx=i.getContext("2d"),this._width=i.width,this._height=i.height,this._max=1,void this.clear()):new t(i)}t.prototype={defaultRadius:25,defaultGradient:{.2:"#1b263b",.35:"#415a77",.5:"#778da9",.7:"#ffba08",.85:"#f48c06",1:"#d00000"},data:function(t){return this._data=t,this},max:function(t){return this._max=t,this},add:function(t){return this._data.push(t),this},clear:function(){return this._data=[],this},radius:function(t,i){i=i||15;var a=this._circle=document.createElement("canvas"),s=a.getContext("2d"),e=this._r=t+i;return a.width=a.height=2*e,s.shadowOffsetX=s.shadowOffsetY=200,s.shadowBlur=i,s.shadowColor="black",s.beginPath(),s.arc(e-200,e-200,t,0,2*Math.PI,!0),s.closePath(),s.fill(),this},gradient:function(t){var i=document.createElement("canvas"),a=i.getContext("2d"),s=a.createLinearGradient(0,0,0,256);i.width=1,i.height=256;for(var e in t)s.addColorStop(e,t[e]);return a.fillStyle=s,a.fillRect(0,0,1,256),this._grad=a.getImageData(0,0,1,256).data,this},draw:function(t){this._circle||this.radius(this.defaultRadius),this._grad||this.gradient(this.defaultGradient);var i=this._ctx;i.clearRect(0,0,this._width,this._height);for(var a,s=0,e=this._data.length;e>s;s++)a=this._data[s],i.globalAlpha=Math.max(a[2]/this._max,t||.05),i.drawImage(this._circle,a[0]-this._r,a[1]-this._r);var n=i.getImageData(0,0,this._width,this._height);return this._colorize(n.data,this._grad),i.putImageData(n,0,0),this},_colorize:function(t,i){for(var a,s=3,e=t.length;e>s;s+=4)a=4*t[s],a&&(t[s-3]=i[a],t[s-2]=i[a+1],t[s-1]=i[a+2])}},window.simpleheat=t}();

  </script>

  <script>
    const initialData = {
      "North America": { population: 604000000, infected: 8200000, center: [54, -105], bounds: [[15, -170], [83, -50]], country: "Multiple" },
      "South America": { population: 439000000, infected: 5100000, center: [-15, -60], bounds: [[-58, -92], [15, -30]], country: "Multiple" },
      "Africa": { population: 1460000000, infected: 9100000, center: [3, 21], bounds: [[-35, -20], [38, 52]], country: "Multiple" },
      "Asia": { population: 4780000000, infected: 28600000, center: [34, 96], bounds: [[5, 25], [78, 180]], country: "Multiple" },
      "Europe": { population: 748000000, infected: 6400000, center: [54, 15], bounds: [[35, -12], [72, 40]], country: "Multiple" },
      "Australia": { population: 46000000, infected: 240000, center: [-25, 134], bounds: [[-47, 110], [-9, 179]], country: "Australia" },
      "Antarctica": { population: 4500, infected: 120, center: [-82, 20], bounds: [[-89, -180], [-60, 180]], country: "Antarctica" }
    };

    const continentBounds = {
      "North America": [[15, -170], [83, -50]],
      "South America": [[-58, -92], [15, -30]],
      "Africa": [[-35, -20], [38, 52]],
      "Asia": [[5, 25], [78, 180]],
      "Europe": [[35, -12], [72, 40]],
      "Australia": [[-47, 110], [-9, 179]],
      "Antarctica": [[-89, -180], [-60, 180]]
    };

    let state = JSON.parse(JSON.stringify(initialData));
    let heatLayer;
    let lastSearchCountry = "";
    let activeBoundaryLayer;
    let outbreakBoundaryLayer;
    let outbreakRowsByArea = new Map();
    let activeBoundaryContext = null;
    let outbreakBoundaryRequestId = 0;

    const map = L.map("map", {
      zoomControl: false,
      scrollWheelZoom: true,
      attributionControl: false,
      minZoom: 2,
      maxZoom: 19
    }).setView([18, 10], 2);

    const labelsPane = map.getPane("labels") || map.createPane("labels");
    labelsPane.style.zIndex = "650";
    labelsPane.style.pointerEvents = "none";

    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}.png", {
      subdomains: "abcd",
      maxZoom: 19,
      minZoom: 2
    }).addTo(map);

    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}.png", {
      subdomains: "abcd",
      pane: "labels",
      maxZoom: 19,
      minZoom: 2
    }).addTo(map);

    outbreakBoundaryLayer = L.layerGroup().addTo(map);

    function numberFmt(value) {
      return new Intl.NumberFormat().format(Math.round(value));
    }

    function normalizeGeoName(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/&/g, " and ")
        .replace(/['’.]/g, "")
        .replace(/\([^)]*\)/g, " ")
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "")
        .replace(/_+/g, "_");
    }

    function findContinentName(areaName) {
      const normalized = normalizeGeoName(areaName);
      return Object.keys(initialData).find((name) => normalizeGeoName(name) === normalized) || "";
    }

    const countryAliases = {
      united_states: "usa",
      united_states_of_america: "usa",
      us: "usa",
      usa: "usa",
      united_kingdom: "united_kingdom",
      uk: "united_kingdom",
      cote_divoire: "ivory_coast",
      cote_d_ivoire: "ivory_coast",
      ivory_coast: "ivory_coast",
      timor_leste: "east_timor",
      cabo_verde: "cape_verde",
      republic_of_the_congo: "congo",
      democratic_republic_of_the_congo: "democratic_congo",
      dr_congo: "democratic_congo",
      congo_kinshasa: "democratic_congo",
      congo_brazzaville: "congo",
      czech_republic: "czechia",
      czechia: "czechia",
      republic_of_palau: "palau",
      swaziland: "eswatini",
      vatican_city: "vatican",
      holy_see: "vatican",
      russian_federation: "russia",
      korea_north: "north_korea",
      north_korea: "north_korea",
      korea_south: "south_korea",
      south_korea: "south_korea",
      palestinian_territories: "palestine",
      state_of_palestine: "palestine",
      macedonia: "north_macedonia",
      myanmar_burma: "myanmar"
    };

    const stateAliases = {
      washington_dc: "district_of_columbia",
      district_of_columbia: "district_of_columbia",
      dc: "district_of_columbia"
    };

    function popupStatsHtml(title, values, details = []) {
      const ratePct = infectedRate(values.population, values.infected) * 100;
      return `
        <strong>${title}</strong><br>
        ${details.filter(Boolean).join("<br>")}${details.length ? "<br>" : ""}
        Population: ${numberFmt(values.population)}<br>
        Infected: ${numberFmt(values.infected)}<br>
        Uninfected: ${numberFmt(uninfected(values.population, values.infected))}<br>
        Infection Rate: ${ratePct.toFixed(2)}%
      `;
    }

    function getOutbreakValues(areaName) {
      return outbreakRowsByArea.get(normalizeGeoName(areaName)) || null;
    }

    function getBoundaryStyle(values) {
      const intensity = values ? infectedRate(values.population, values.infected) : 0;
      return {
        color: "#CC0000",
        weight: values ? 2 : 1.6,
        opacity: 0.95,
        fillColor: "#700000",
        fillOpacity: values ? Math.max(0.12, Math.min(0.48, intensity * 3.5)) : 0.08
      };
    }

    function clearActiveBoundary() {
      if (activeBoundaryLayer) {
        map.removeLayer(activeBoundaryLayer);
        activeBoundaryLayer = null;
      }

      activeBoundaryContext = null;
    }

    function clearOutbreakBoundaries() {
      if (outbreakBoundaryLayer) {
        outbreakBoundaryLayer.clearLayers();
      }
    }

    async function fetchFirstGeoJson(paths) {
      for (const path of paths) {
        try {
          const response = await fetch(path);
          if (!response.ok) continue;
          return { data: await response.json(), path };
        } catch (error) {
          console.warn(`Failed to load ${path}:`, error);
        }
      }

      return null;
    }

    function buildCountryCandidates(countryName) {
      const normalized = normalizeGeoName(countryName);
      const alias = countryAliases[normalized];
      return [...new Set([alias, normalized].filter(Boolean))].map((slug) => `countries/${slug}.json`);
    }

    function buildStateCandidates(countrySlug, stateName) {
      if (!countrySlug || !stateName) return [];

      const normalized = normalizeGeoName(stateName);
      const alias = stateAliases[normalized];

      return [...new Set([alias, normalized].filter(Boolean))].map(
        (slug) => `states/${countrySlug}/${slug}.json`
      );
    }

    function buildAreaCandidates(areaName) {
      const normalized = normalizeGeoName(areaName);
      const countryAlias = countryAliases[normalized];
      const stateAlias = stateAliases[normalized];
      const countryCandidates = [...new Set([countryAlias, normalized].filter(Boolean))].map(
        (slug) => `countries/${slug}.json`
      );
      const stateCandidates = [...new Set([stateAlias, normalized].filter(Boolean))].flatMap((slug) => [
        `states/usa/${slug}.json`,
        `states/canada/${slug}.json`
      ]);

      return [...countryCandidates, ...stateCandidates];
    }

    async function loadBoundaryData(countryName, stateName) {
      const countryPaths = buildCountryCandidates(countryName);
      const countryMatch = await fetchFirstGeoJson(countryPaths);

      if (!countryMatch) return null;

      const countrySlug = countryMatch.path.split("/").pop().replace(/\.json$/, "");
      const statePaths = buildStateCandidates(countrySlug, stateName);
      const stateMatch = statePaths.length ? await fetchFirstGeoJson(statePaths) : null;

      return {
        countryGeoJson: countryMatch.data,
        stateGeoJson: stateMatch ? stateMatch.data : null,
        countrySlug,
        countryPath: countryMatch.path,
        statePath: stateMatch ? stateMatch.path : ""
      };
    }

    async function loadAreaBoundaryData(areaName) {
      const match = await fetchFirstGeoJson(buildAreaCandidates(areaName));
      if (!match) return null;

      const pathParts = match.path.split("/");
      const areaType = pathParts[0] === "countries" ? "country" : "state";
      const countrySlug = areaType === "state" ? pathParts[1] : pathParts[0];

      return {
        areaType,
        geoJson: match.data,
        path: match.path,
        countrySlug
      };
    }

    function renderBoundaryLayer(geoJson, label, values, details = []) {
      activeBoundaryLayer = L.geoJSON(geoJson, {
        style: () => getBoundaryStyle(values),
        onEachFeature(feature, layer) {
          const popupContent = values
            ? popupStatsHtml(label, values, details)
            : `<strong>${label}</strong><br>${details.filter(Boolean).join("<br>")}`;

          layer.bindPopup(popupContent, {
            closeButton: false,
            autoPan: false
          });

          layer.on("mouseover", function () {
            this.openPopup();
          });

          layer.on("click", function () {
            this.openPopup();
          });
        }
      }).addTo(map);

      map.fitBounds(activeBoundaryLayer.getBounds(), { padding: [20, 20] });
    }

    function buildBoundaryGeoJsonLayer(geoJson, label, values, details = []) {
      return L.geoJSON(geoJson, {
        style: () => getBoundaryStyle(values),
        onEachFeature(feature, layer) {
          const popupContent = popupStatsHtml(label, values, details);

          layer.bindPopup(popupContent, {
            closeButton: false,
            autoPan: false
          });

          layer.on("mouseover", function () {
            this.openPopup();
          });

          layer.on("click", function () {
            this.openPopup();
          });
        }
      });
    }

    async function renderOutbreakBoundaries(rows) {
      const requestId = ++outbreakBoundaryRequestId;
      const boundaryRows = rows.filter((row) => {
        const areaName = String(row.nameOfArea || "").trim();
        return areaName && !findContinentName(areaName);
      });

      if (!boundaryRows.length) {
        clearOutbreakBoundaries();
        return;
      }

      const resolvedRows = await Promise.all(boundaryRows.map(async (row) => {
        const areaName = String(row.nameOfArea || "").trim();
        const values = outbreakRowsByArea.get(normalizeGeoName(areaName));
        const boundary = await loadAreaBoundaryData(areaName);

        if (!boundary || !values) return null;

        return {
          areaName,
          values,
          boundary
        };
      }));

      if (requestId !== outbreakBoundaryRequestId) {
        return;
      }

      clearOutbreakBoundaries();

      resolvedRows.filter(Boolean).forEach(({ areaName, values, boundary }) => {
        const details = [];

        if (boundary.areaType === "state") {
          const parentCountry = boundary.path.startsWith("states/canada/") ? "Canada" : "United States";
          details.push(`Country: ${parentCountry}`);
        }

        buildBoundaryGeoJsonLayer(boundary.geoJson, areaName, values, details).addTo(outbreakBoundaryLayer);
      });
    }

    function infectedRate(population, infected) {
      if (!population || population <= 0) return 0;
      return infected / population;
    }

    function uninfected(population, infected) {
      return Math.max(0, population - infected);
    }

    function popupHtml(name, values) {
      const countryLabel = values.country || lastSearchCountry || "Unknown";
      return popupStatsHtml(name, values, [`Continent: ${name}`, `Country: ${countryLabel}`]);
    }

    function buildHeatPoints() {
      const points = [];

      Object.entries(state).forEach(([name, values]) => {
        const intensity = infectedRate(values.population, values.infected);
        const normalized = Math.max(0.15, Math.min(intensity / 0.08, 1));

        points.push([values.center[0], values.center[1], Math.max(0.25, normalized)]);
      });

      return points;
    }

    function renderGeographyLayer() {
      if (!activeBoundaryContext) return;

      const boundaryContext = activeBoundaryContext;

      clearActiveBoundary();

      if (!boundaryContext.geoJson) return;

      activeBoundaryContext = boundaryContext;
      boundaryContext.replay();
    }

    function renderHeat() {
      const heatPoints = buildHeatPoints();

      if (heatLayer) {
        heatLayer.setLatLngs(heatPoints);
      } else {
        heatLayer = L.heatLayer(heatPoints, {
          radius: 42,
          blur: 32,
          maxZoom: 5,
          minOpacity: 0.28,
          max: 1,
          gradient: {
            0.15: "#1b263b",
            0.3: "#415a77",
            0.45: "#778da9",
            0.6: "#ffba08",
            0.78: "#f48c06",
            1.0: "#d00000"
          }
        }).addTo(map);
      }

      renderGeographyLayer();
    }

    async function searchLocation(query) {
      const normalized = query.trim();
      if (!normalized) return;

      const continentMatch = Object.keys(continentBounds).find(
        (name) => name.toLowerCase() === normalized.toLowerCase()
      );

      if (continentMatch) {
        clearActiveBoundary();
        map.fitBounds(continentBounds[continentMatch], { padding: [20, 20] });
        lastSearchCountry = "";
        return;
      }

      try {
        const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&addressdetails=1&q=${encodeURIComponent(normalized)}`;
        const response = await fetch(url, {
          headers: { "Accept": "application/json" }
        });

        const results = await response.json();
        if (!Array.isArray(results) || !results.length) return;

        const place = results[0];
        const lat = Number(place.lat);
        const lon = Number(place.lon);

        if (!Number.isFinite(lat) || !Number.isFinite(lon)) return;

        const countryName = place.address?.country || "";
        const stateName = place.address?.state || place.address?.province || place.address?.region || "";
        const boundary = await loadBoundaryData(countryName, stateName);

        lastSearchCountry = countryName;
        clearActiveBoundary();

        if (boundary?.stateGeoJson) {
          const stateValues = getOutbreakValues(stateName);
          activeBoundaryContext = {
            geoJson: boundary.stateGeoJson,
            replay() {
              renderBoundaryLayer(boundary.stateGeoJson, stateName || normalized, stateValues, [
                `Country: ${countryName || "Unknown"}`
              ]);
            }
          };
          activeBoundaryContext.replay();
        } else if (boundary?.countryGeoJson) {
          const countryValues = getOutbreakValues(countryName);
          activeBoundaryContext = {
            geoJson: boundary.countryGeoJson,
            replay() {
              renderBoundaryLayer(boundary.countryGeoJson, countryName || normalized, countryValues);
            }
          };
          activeBoundaryContext.replay();
        } else {
          map.flyTo([lat, lon], 5, { duration: 1.5 });
        }

        L.popup({
          closeButton: false,
          autoClose: true,
          closeOnClick: true
        })
          .setLatLng([lat, lon])
          .setContent(`
            <strong>${normalized}</strong><br>
            ${stateName ? `${stateName}, ` : ""}${countryName}
          `)
          .openOn(map);

      } catch (error) {
        console.error("Location search failed:", error);
      }
    }

    function applyWixCollectionData(rows) {
      if (!Array.isArray(rows)) return;

      state = JSON.parse(JSON.stringify(initialData));
      outbreakRowsByArea = new Map();

      rows.forEach((row) => {
        const areaName = String(row.nameOfArea || "").trim();
        if (!areaName) return;

        const normalizedAreaName = normalizeGeoName(areaName);
        const values = {
          population: Number(row.population || 0),
          infected: Number(row.infected || 0)
        };

        outbreakRowsByArea.set(normalizedAreaName, values);

        const continentName = findContinentName(areaName);
        if (!state[continentName]) return;

        state[continentName].population = values.population;
        state[continentName].infected = values.infected;
      });

      renderHeat();
      renderOutbreakBoundaries(rows);
    }

    document.getElementById("searchBtn").addEventListener("click", () => {
      searchLocation(document.getElementById("locationInput").value);
    });

    document.getElementById("locationInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        searchLocation(event.target.value);
      }
    });

    window.addEventListener("message", (event) => {
      const message = event.data;
      if (!message || typeof message !== "object") return;

      if (message.type === "OUTBREAK_DATA") {
        applyWixCollectionData(message.payload);
      }

      if (message.type === "SET_LOCATION" && typeof message.payload === "string") {
        const input = document.getElementById("locationInput");
        input.value = message.payload;
        searchLocation(message.payload);
      }
    });

    renderHeat();
    window.parent.postMessage({ type: "MAP_READY" }, "*");
  </script>
</body>
</html>
